<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Monero Miner GUI V4</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Monero Miner Dashboard <span id="protocol-v" class="protocol-badge">RandomX</span></h1>
            <div id="status-badge" class="badge">Checking...</div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Hashrate</h3>
                <p id="hashrate">0.00 H/s</p>
            </div>
            <div class="stat-card">
                <h3>CPU Temp</h3>
                <p id="temp">-- °C</p>
            </div>
            <div class="stat-card">
                <h3>Shares Found</h3>
                <p id="shares">0</p>
            </div>
            <div class="stat-card">
                <h3>Threads (Auto)</h3>
                <p id="threads">0</p>
            </div>
        </section>

        <section class="controls">
            <h2>Miner Configuration</h2>
            <form id="config-form">
                <div class="form-group">
                    <label>Pool Host:</label>
                    <input type="text" name="host" id="host" value="pool.supportxmr.com">
                </div>
                <div class="form-group">
                    <label>Pool Port:</label>
                    <input type="number" name="port" id="port" value="3333">
                </div>
                <div class="form-group">
                    <label>Monero Address:</label>
                    <input type="text" name="user" id="user" placeholder="Your XMR Address">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="text" name="pass" id="pass" value="x">
                </div>
                <div class="form-group">
                    <label>Initial Threads:</label>
                    <input type="number" name="threads" id="threads-in" value="4">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" name="autotune" id="autotune" checked>
                    <label for="autotune">AI Auto-Tuning & Throttling</label>
                </div>
                <div class="btn-group">
                    <button type="button" id="start-btn" class="btn btn-primary">Start Mining</button>
                    <button type="button" id="stop-btn" class="btn btn-danger">Stop Mining</button>
                </div>
            </form>
        </section>

        <section class="log-section">
            <h2>AI Status</h2>
            <div class="stat-card" style="width: 100%;">
                <p>AI Neural Network Trained: <span id="ai-trained">No</span></p>
                <p>Total Hashes Processed: <span id="total-hashes">0</span></p>
            </div>
        </section>
    </div>

    <script>
        function updateStats() {
            fetch('/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hashrate').textContent = data.hash_rate.toFixed(2) + ' H/s';
                    document.getElementById('total-hashes').textContent = data.total_hashes;
                    document.getElementById('shares').textContent = data.shares_found;
                    document.getElementById('threads').textContent = data.threads;
                    document.getElementById('temp').textContent = (data.cpu_temp ? data.cpu_temp.toFixed(1) : '--') + ' °C';
                    document.getElementById('ai-trained').textContent = data.ai_trained ? 'Yes' : 'No';

                    const badge = document.getElementById('status-badge');
                    if (data.is_mining) {
                        badge.textContent = 'Mining Active';
                        badge.className = 'badge active';
                    } else {
                        badge.textContent = 'Miner Stopped';
                        badge.className = 'badge stopped';
                    }
                });
        }

        document.getElementById('start-btn').onclick = () => {
            const formData = new FormData(document.getElementById('config-form'));
            fetch('/start', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => alert(data.status));
        };

        document.getElementById('stop-btn').onclick = () => {
            fetch('/stop', { method: 'POST' })
                .then(r => r.json())
                .then(data => alert(data.status));
        };

        setInterval(updateStats, 2000);
        updateStats();
    </script>
</body>
</html>
