<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Litecoin Miner GUI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Litecoin Miner Dashboard</h1>
            <div id="status-badge" class="badge">Checking...</div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Hashrate</h3>
                <p id="hashrate">0.00 H/s</p>
            </div>
            <div class="stat-card">
                <h3>Total Hashes</h3>
                <p id="total-hashes">0</p>
            </div>
            <div class="stat-card">
                <h3>Shares Found</h3>
                <p id="shares">0</p>
            </div>
            <div class="stat-card">
                <h3>AI Model Status</h3>
                <p id="ai-status">Ready</p>
            </div>
        </section>

        <section class="controls">
            <h2>Miner Configuration</h2>
            <form id="config-form">
                <div class="form-group">
                    <label>Pool Host:</label>
                    <input type="text" name="host" id="host" value="litecoinpool.org">
                </div>
                <div class="form-group">
                    <label>Pool Port:</label>
                    <input type="number" name="port" id="port" value="3333">
                </div>
                <div class="form-group">
                    <label>Worker Username:</label>
                    <input type="text" name="user" id="user" placeholder="username.worker">
                </div>
                <div class="form-group">
                    <label>Threads:</label>
                    <input type="number" name="threads" id="threads" value="4">
                </div>
                <div class="btn-group">
                    <button type="button" id="start-btn" class="btn btn-primary">Start Mining</button>
                    <button type="button" id="stop-btn" class="btn btn-danger">Stop Mining</button>
                </div>
            </form>
        </section>

        <section class="log-section">
            <h2>Recent Activity</h2>
            <div id="logs" class="log-window">
                <p>Waiting for activity...</p>
            </div>
        </section>
    </div>

    <script>
        function updateStats() {
            fetch('/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hashrate').textContent = data.hash_rate.toFixed(2) + ' H/s';
                    document.getElementById('total-hashes').textContent = data.total_hashes;
                    document.getElementById('shares').textContent = data.shares_found;
                    document.getElementById('ai-status').textContent = data.ai_trained ? 'Trained & Predicting' : 'Training...';

                    const badge = document.getElementById('status-badge');
                    if (data.is_mining) {
                        badge.textContent = 'Mining Active';
                        badge.className = 'badge active';
                    } else {
                        badge.textContent = 'Miner Stopped';
                        badge.className = 'badge stopped';
                    }
                });
        }

        document.getElementById('start-btn').onclick = () => {
            const formData = new FormData(document.getElementById('config-form'));
            fetch('/start', { method: 'POST', body: formData });
        };

        document.getElementById('stop-btn').onclick = () => {
            fetch('/stop', { method: 'POST' });
        };

        setInterval(updateStats, 2000);
        updateStats();
    </script>
</body>
</html>
